<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}shingikai UI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-stone-100 text-stone-900">
    <div class="min-h-screen">
      <header class="border-b border-stone-200 bg-white">
        <div class="mx-auto max-w-7xl px-6 py-5">
          <a href="{{ page_url('index') }}" class="text-xl font-semibold tracking-tight">shingikai</a>
          <p class="mt-1 text-sm text-stone-500">審議会データ確認用 UI</p>
          <div class="mt-3 flex flex-wrap gap-3 text-sm text-stone-600">
            <a href="{{ page_url('index') }}" class="underline">会議体一覧</a>
            <a href="{{ page_url('councils_treemap') }}" class="underline">会議体系統</a>
            <a href="{{ page_url('monthly_meetings_index') }}" class="underline">月別開催</a>
            <a href="{{ page_url('meeting_gaps_active') }}" class="underline">欠番確認</a>
          </div>
        </div>
      </header>
      <main class="mx-auto max-w-7xl px-6 py-8">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
